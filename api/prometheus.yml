global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'iam-backend'
    static_configs:
      - targets: ['backend:3000']

  - job_name: 'iam-event-worker'
    static_configs:
      - targets: ['worker:9091']

  - job_name: 'iam-defense-worker'
    static_configs:
      - targets: ['defense_worker:9092']
