services:
  redis:
    image: redis:7-alpine
    container_name: auth_redis
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: authdb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-authdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-authdb}
      REDIS_URL: redis://redis:6379
      JWT_ACTIVE_KID: ${JWT_ACTIVE_KID:-key1}
      JWT_KEY_KEY1_PRIVATE_FILE: /app/keys/key1/private.pem
      JWT_KEY_KEY1_PUBLIC_FILE: /app/keys/key1/public.pem
      JWT_KEY_KEY2_PRIVATE_FILE: /app/keys/key2/private.pem
      JWT_KEY_KEY2_PUBLIC_FILE: /app/keys/key2/public.pem
      JWT_PRIVATE_KEY_FILE: /app/keys/jwt_private.pem
      JWT_PUBLIC_KEY_FILE: /app/keys/jwt_public.pem
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - ./keys:/app/keys:ro
    command: npm run dev
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth_worker
    restart: unless-stopped
    command: npm run worker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-authdb}
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
      - ./keys:/app/keys:ro
    networks:
      - backend

  defense_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth_defense_worker
    restart: unless-stopped
    command: npm run worker:defense
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-authdb}
      REDIS_URL: redis://redis:6379
      # Defense worker uses SCAN — safe on Redis 7 (image: redis:7-alpine)
    volumes:
      - .:/app
      - /app/node_modules
      - ./keys:/app/keys:ro
    networks:
      - backend

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: auth_migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-authdb}
    command: ['npx', 'prisma', 'migrate', 'deploy']
    restart: 'no'
    networks:
      - backend

  attacker:
    profiles: ["attack"]
    build:
      context: ../simulation-engine/cloudshield-attacker
      dockerfile: Dockerfile
    container_name: auth_attacker
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TARGET_URL: http://backend:3000
      ATTACK_EMAIL: ${ATTACK_EMAIL:-attacker@test.com}
      ATTACK_PASSWORD: ${ATTACK_PASSWORD:-Attack@123}
      ATTACK_MODE: ${ATTACK_MODE:-all}
    volumes:
      - ./reports:/reports
    networks:
      - backend
    restart: "no"

  #  Attack ingestion (results.json → Redis)
  attack-ingest:
    profiles: ["attack"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth_attack_ingest
    command: node scripts/ingestAttackEvents.js --file /app/reports/results.json
    depends_on:
      redis:
        condition: service_healthy
      attacker:
        condition: service_completed_successfully
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
      - ./reports:/app/reports
    networks:
      - backend
    restart: "no"



  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - backend
    depends_on:
      - backend

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    networks:
      - backend

  neo4j:
    image: neo4j:5
    container_name: auth_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    networks:
      - backend
volumes:
  postgres_data:

networks:
  backend: