services:
  postgres:
    image: postgres:16-alpine
    container_name: authdb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-authdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-authdb}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: auth_migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-authdb}
    command: ['npx', 'prisma', 'migrate', 'deploy']
    restart: 'no'
    networks:
      - backend

  attacker:
    build:
      context: ../simulation-engine/cloudshield-attacker
      dockerfile: Dockerfile
    container_name: auth_attacker
    depends_on:
      api:
        condition: service_healthy
    environment:
      TARGET_URL: http://api:3000
      ATTACK_EMAIL: ${ATTACK_EMAIL:-attacker@test.com}
      ATTACK_PASSWORD: ${ATTACK_PASSWORD:-Attack@123}
      # ATTACK_MODE options: all | token_race (atk01) | mfa_replay (atk02)
      ATTACK_MODE: ${ATTACK_MODE:-all}
    volumes:
      - attack_reports:/reports
    networks:
      - backend
    restart: "no"

volumes:
  postgres_data:
  attack_reports:

networks:
  backend: